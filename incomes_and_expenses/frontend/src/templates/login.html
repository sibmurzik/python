<div class="container-fluid d-flex align-items-center justify-content-center h-100">

    <main class="login-register-page  d-flex flex-column align-items-center justify-content-center  h-100">


        <div class="logo-box">
            <img src="static/images/Logo.png" class="img-fluid" alt="logo">
        </div>


        <form class="login-register-form form needs-validation w-100">


            <h1 class="title text-center mb-3 pb-3 pb-lg-1">Вход</h1>
            <div class="input-group mb-2 bg-white ">
            <span class="input-group-text">
               <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                     <path fill-rule="evenodd" clip-rule="evenodd"
                           d="M13.6885 4.3176L7.3885 0.1176C7.1533 -0.0392 6.8474 -0.0392 6.6122 0.1176L0.3122 4.3176C0.1169 4.4478 0 4.6662 0 4.9V12.6C0 13.3721 0.6279 14 1.4 14H12.6C13.3721 14 14 13.3721 14 12.6V4.9C14 4.6662 13.8831 4.4478 13.6885 4.3176ZM7 1.5414L12.0379 4.9L7 8.2586L1.9621 4.9L7 1.5414ZM1.4 12.6V6.2083L6.6115 9.6824C6.7291 9.7608 6.8649 9.8 7 9.8C7.1351 9.8 7.2709 9.7608 7.3885 9.6824L12.6 6.2083L12.5979 12.6H1.4Z"
                           fill="#6C757D"/>
                </svg>
            </span>
                <input type="email" class="form-control" id="emailInput" placeholder="Электронная почта">
            </div>
            <div class="invalid-feedback mb-2 fw-normal" id="emailFeedback">
                 Правильный формат 'someone@example.xxx(больше 2 букв)'
            </div>


            <div class="input-group mb-2 bg-white">
            <span class="input-group-text">
              <svg width="13" height="16" viewBox="0 0 13 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd"
                      d="M6.4 0C4.1944 0 2.4 1.7944 2.4 4V6.4H1.6C0.7176 6.4 0 7.1176 0 8V14.4C0 15.2824 0.7176 16 1.6 16H11.2C12.0824 16 12.8 15.2824 12.8 14.4V8C12.8 7.1176 12.0824 6.4 11.2 6.4H10.4V4C10.4 1.7944 8.6056 0 6.4 0ZM11.2 8L11.2016 14.4H1.6V8H11.2ZM4 6.4V4C4 2.6768 5.0768 1.6 6.4 1.6C7.7232 1.6 8.8 2.6768 8.8 4V6.4H4Z"
                      fill="#6C757D"/>
               </svg>
            </span>
                <input type="password" class="form-control" id="passwordInput" placeholder="Пароль">
            </div>
            <div class="invalid-feedback mb-2 fw-normal" id="passwordFeedback">
                Минимум 8 символов включая хотя бы одну цифру, заглавную букву и спец символ
            </div>

            <div class="form-check text-start mb-3 pb-1">
                <input class="form-check-input" type="checkbox" value="remember-me" id="checkRememberMe">
                <label class="form-check-label ps-1" for="checkRememberMe">
                    Запомнить меня
                </label>
            </div>
            <button class="btn btn-primary w-100 py-2" type="button" id="loginButton">Войти</button>
            <p class="form-link">
                Ещё нет аккаунта?
                <a class="link-offset-1 link-offset-2-hover" href="/signup">Пройдите регистрацию</a>
            </p>
        </form>

    </main>

</div>
